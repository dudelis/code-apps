<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tic Tac Toe</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: #1a1a2e;
      font-family: 'Segoe UI', sans-serif;
      color: #eee;
    }

    h1 {
      font-size: 2.5rem;
      margin-bottom: 1rem;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: #e94560;
    }

    #status {
      font-size: 1.2rem;
      margin-bottom: 1.5rem;
      min-height: 1.6rem;
      color: #a8dadc;
    }

    #board {
      display: grid;
      grid-template-columns: repeat(3, 110px);
      grid-template-rows: repeat(3, 110px);
      gap: 8px;
    }

    .cell {
      background: #16213e;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 3rem;
      font-weight: bold;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
      user-select: none;
    }

    .cell:hover:not(.taken) {
      background: #0f3460;
      transform: scale(1.04);
    }

    .cell.x { color: #e94560; }
    .cell.o { color: #a8dadc; }

    .cell.win {
      background: #0f3460;
      box-shadow: 0 0 16px 4px rgba(168, 218, 220, 0.4);
    }

    #controls {
      margin-top: 1.8rem;
      display: flex;
      gap: 12px;
      align-items: center;
    }

    button {
      padding: 10px 28px;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      cursor: pointer;
      background: #e94560;
      color: #fff;
      transition: background 0.15s, transform 0.1s;
    }

    button:hover { background: #c73652; transform: scale(1.04); }

    #score {
      margin-top: 1.5rem;
      display: flex;
      gap: 32px;
      font-size: 1rem;
      color: #a8dadc;
    }

    #score span { font-weight: bold; color: #fff; }

    label { font-size: 0.95rem; color: #a8dadc; }
    select {
      background: #16213e;
      color: #eee;
      border: 1px solid #0f3460;
      border-radius: 6px;
      padding: 6px 10px;
      font-size: 0.95rem;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <h1>Tic Tac Toe</h1>
  <div id="status">X's turn</div>

  <div id="board">
    <div class="cell" data-i="0"></div>
    <div class="cell" data-i="1"></div>
    <div class="cell" data-i="2"></div>
    <div class="cell" data-i="3"></div>
    <div class="cell" data-i="4"></div>
    <div class="cell" data-i="5"></div>
    <div class="cell" data-i="6"></div>
    <div class="cell" data-i="7"></div>
    <div class="cell" data-i="8"></div>
  </div>

  <div id="controls">
    <label>vs
      <select id="mode">
        <option value="human">Human</option>
        <option value="easy">AI — Easy</option>
        <option value="hard">AI — Hard</option>
      </select>
    </label>
    <button id="restart">Restart</button>
  </div>

  <div id="score">
    <div>X wins: <span id="xWins">0</span></div>
    <div>Draws: <span id="draws">0</span></div>
    <div>O wins: <span id="oWins">0</span></div>
  </div>

  <script>
    const WINS = [
      [0,1,2],[3,4,5],[6,7,8],
      [0,3,6],[1,4,7],[2,5,8],
      [0,4,8],[2,4,6]
    ];

    let board, current, over;
    let score = { x: 0, o: 0, d: 0 };

    const cells    = document.querySelectorAll('.cell');
    const status   = document.getElementById('status');
    const modeEl   = document.getElementById('mode');
    const xWinsEl  = document.getElementById('xWins');
    const oWinsEl  = document.getElementById('oWins');
    const drawsEl  = document.getElementById('draws');

    function init() {
      board   = Array(9).fill('');
      current = 'X';
      over    = false;
      cells.forEach(c => { c.textContent = ''; c.className = 'cell'; });
      status.textContent = "X's turn";
    }

    function checkWinner(b) {
      for (const [a, m, z] of WINS) {
        if (b[a] && b[a] === b[m] && b[a] === b[z]) return { winner: b[a], line: [a, m, z] };
      }
      if (b.every(v => v)) return { winner: 'draw' };
      return null;
    }

    function applyMove(idx, player) {
      board[idx] = player;
      cells[idx].textContent = player;
      cells[idx].classList.add('taken', player.toLowerCase());
    }

    function endGame(result) {
      over = true;
      if (result.winner === 'draw') {
        status.textContent = "It's a draw!";
        score.d++;
        drawsEl.textContent = score.d;
      } else {
        status.textContent = `${result.winner} wins!`;
        result.line.forEach(i => cells[i].classList.add('win'));
        if (result.winner === 'X') { score.x++; xWinsEl.textContent = score.x; }
        else                       { score.o++; oWinsEl.textContent = score.o; }
      }
    }

    function humanMove(idx) {
      if (over || board[idx]) return;
      applyMove(idx, current);
      const result = checkWinner(board);
      if (result) { endGame(result); return; }
      current = current === 'X' ? 'O' : 'X';
      status.textContent = `${current}'s turn`;

      const mode = modeEl.value;
      if (current === 'O' && mode !== 'human') {
        setTimeout(() => aiMove(mode), 250);
      }
    }

    function aiMove(mode) {
      if (over) return;
      const idx = mode === 'hard' ? bestMove() : randomMove();
      applyMove(idx, 'O');
      const result = checkWinner(board);
      if (result) { endGame(result); return; }
      current = 'X';
      status.textContent = "X's turn";
    }

    function randomMove() {
      const empty = board.map((v, i) => v ? null : i).filter(i => i !== null);
      return empty[Math.floor(Math.random() * empty.length)];
    }

    function bestMove() {
      let best = -Infinity, move = -1;
      for (let i = 0; i < 9; i++) {
        if (!board[i]) {
          board[i] = 'O';
          const score = minimax(board, 0, false);
          board[i] = '';
          if (score > best) { best = score; move = i; }
        }
      }
      return move;
    }

    function minimax(b, depth, isMax) {
      const result = checkWinner(b);
      if (result) {
        if (result.winner === 'O') return 10 - depth;
        if (result.winner === 'X') return depth - 10;
        return 0;
      }
      if (isMax) {
        let best = -Infinity;
        for (let i = 0; i < 9; i++) {
          if (!b[i]) { b[i] = 'O'; best = Math.max(best, minimax(b, depth+1, false)); b[i] = ''; }
        }
        return best;
      } else {
        let best = Infinity;
        for (let i = 0; i < 9; i++) {
          if (!b[i]) { b[i] = 'X'; best = Math.min(best, minimax(b, depth+1, true)); b[i] = ''; }
        }
        return best;
      }
    }

    cells.forEach(c => c.addEventListener('click', () => humanMove(+c.dataset.i)));
    document.getElementById('restart').addEventListener('click', init);

    init();
  </script>
</body>
</html>
